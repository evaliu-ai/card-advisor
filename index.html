<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智慧用卡建議</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
:root{
  --bg:#F7F5F0;--surface:#FFF;--border:#E5E1D8;--border-strong:#C0BAB0;
  --text:#18120E;--muted:#7A746A;--hint:#B0AA9E;
  --teal:#0F6E56;--teal-bg:#E1F5EE;--amber:#854F0B;--amber-bg:#FAEEDA;
  --blue:#185FA5;--blue-bg:#E6F1FB;--green:#3B6D11;--green-bg:#EAF3DE;
  --red:#A32D2D;--red-bg:#FCEBEB;--r:12px;--rsm:8px;--rpill:20px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.6;}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:1rem 1.75rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{font-size:15px;font-weight:600;letter-spacing:-.02em;display:flex;align-items:center;gap:8px;}
.dot{width:7px;height:7px;background:#1D9E75;border-radius:50%;}
.stamp{font-size:11px;color:var(--hint);font-family:'DM Mono',monospace;background:var(--bg);border:1px solid var(--border);padding:3px 10px;border-radius:var(--rpill);}
.main{max-width:980px;margin:0 auto;padding:1.75rem 1.5rem 5rem;}
.ptabs{display:flex;gap:6px;margin-bottom:1.75rem;}
.ptab{padding:7px 18px;border:1px solid var(--border);border-radius:var(--rpill);cursor:pointer;background:var(--surface);color:var(--muted);font-size:13px;font-family:inherit;transition:all .15s;}
.ptab:hover{color:var(--text);border-color:var(--border-strong);}
.ptab.active{background:var(--text);color:var(--surface);border-color:var(--text);font-weight:500;}
.ppanel{display:none;}.ppanel.active{display:block;}
.adv-layout{display:grid;grid-template-columns:210px 1fr;gap:14px;align-items:start;}
@media(max-width:700px){.adv-layout{grid-template-columns:1fr;}}
.cat-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;position:sticky;top:72px;max-height:calc(100vh - 90px);overflow-y:auto;}
.cg-label{font-size:10px;font-weight:500;letter-spacing:.08em;color:var(--hint);text-transform:uppercase;padding:8px 14px 3px;background:var(--bg);border-bottom:1px solid var(--border);}
.cbtn{display:block;width:100%;padding:8px 14px;border:none;border-bottom:1px solid var(--border);cursor:pointer;background:transparent;color:var(--muted);font-size:13px;font-family:inherit;text-align:left;transition:all .12s;}
.cbtn:last-child{border-bottom:none;}
.cbtn:hover{background:var(--bg);color:var(--text);}
.cbtn.active{background:var(--text);color:var(--surface);font-weight:500;}
.det-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.5rem;min-height:280px;}
.det-ph{color:var(--hint);font-size:13px;display:flex;align-items:center;justify-content:center;min-height:200px;text-align:center;line-height:1.8;}
.det-title{font-size:17px;font-weight:600;color:var(--text);margin-bottom:3px;}
.det-sub{font-size:12px;color:var(--hint);margin-bottom:1.1rem;padding-bottom:1rem;border-bottom:1px solid var(--border);}
.rlist{display:flex;flex-direction:column;}
.rrow{padding:12px 0;border-bottom:1px solid var(--border);}
.rrow:first-child{padding-top:0;}
.rrow:last-child{border-bottom:none;padding-bottom:0;}
.rheader{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:5px;}
.rname{font-size:14px;font-weight:500;color:var(--text);}
.rtag{font-family:'DM Mono',monospace;font-size:11px;font-weight:500;padding:2px 10px;border-radius:var(--rpill);white-space:nowrap;flex-shrink:0;}
.tg{background:var(--green-bg);color:var(--green);}
.tb{background:var(--blue-bg);color:var(--blue);}
.ta{background:var(--amber-bg);color:var(--amber);}
.tr{background:var(--red-bg);color:var(--red);}
.rstores{font-size:12px;color:var(--teal);margin-bottom:4px;line-height:1.6;}
.rstores b{font-weight:500;color:var(--muted);}
.rdetail{font-size:13px;color:var(--muted);line-height:1.55;margin-bottom:3px;}
.rcond{font-size:11px;color:var(--hint);font-family:'DM Mono',monospace;line-height:1.5;}
.wblk{background:var(--red-bg);border-radius:var(--rsm);padding:9px 13px;margin-top:10px;font-size:12px;color:var(--red);font-weight:500;line-height:1.6;}
.det-footer{margin-top:1.1rem;padding-top:1rem;border-top:1px solid var(--border);font-size:10px;color:var(--hint);font-family:'DM Mono',monospace;}
.slabel{font-size:11px;font-weight:500;letter-spacing:.07em;color:var(--hint);text-transform:uppercase;margin-bottom:1rem;}
.cgridcards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;}
.ctile{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem;}
.ctile:hover{border-color:var(--border-strong);}
.ctop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:11px;}
.cname{font-size:14px;font-weight:600;color:var(--text);}
.cbank{font-size:11px;color:var(--hint);margin-top:2px;}
.cbadge{font-size:10px;padding:3px 9px;border-radius:var(--rpill);font-weight:500;white-space:nowrap;}
.perks{display:flex;flex-direction:column;gap:6px;}
.prow{display:flex;justify-content:space-between;align-items:flex-start;font-size:12px;gap:10px;}
.plabel{color:var(--muted);flex:1;}
.pright{text-align:right;min-width:85px;}
.pval{font-family:'DM Mono',monospace;font-size:11px;font-weight:500;color:var(--teal);}
.plimit{font-size:10px;color:var(--hint);margin-top:1px;line-height:1.35;}
.cfooter{margin-top:11px;padding-top:10px;border-top:1px solid var(--border);font-size:11px;color:var(--muted);line-height:1.5;}
.csrc{color:var(--hint);font-size:10px;margin-top:3px;font-family:'DM Mono',monospace;}
.sbox{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem;margin-bottom:1.25rem;}
.alabel{font-size:11px;font-weight:500;letter-spacing:.07em;color:var(--hint);text-transform:uppercase;margin-bottom:.75rem;}
.sinrow{display:flex;gap:8px;margin-bottom:12px;}
.sinrow input{flex:1;padding:8px 12px;border:1px solid var(--border);border-radius:var(--rsm);font-size:13px;font-family:inherit;background:var(--bg);color:var(--text);outline:none;}
.sinrow input:focus{border-color:var(--border-strong);}
.stags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.stag{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--rpill);font-size:13px;}
.stag button{background:none;border:none;cursor:pointer;color:var(--hint);font-size:15px;line-height:1;padding:0;}
.stag button:hover{color:var(--red);}
.srecs{display:flex;flex-direction:column;gap:8px;margin-top:12px;}
.srec{display:flex;align-items:center;padding:9px 12px;background:var(--bg);border-radius:var(--rsm);font-size:13px;gap:12px;flex-wrap:wrap;}
.srec-store{font-weight:500;color:var(--text);min-width:70px;}
.srec-card{color:var(--muted);flex:1;}
.srec-rate{font-family:'DM Mono',monospace;color:var(--teal);font-weight:500;}
.srec-del{background:none;border:none;cursor:pointer;color:var(--hint);font-size:14px;padding:0 4px;}
.srec-del:hover{color:var(--red);}
.empty{text-align:center;padding:2rem;color:var(--hint);font-size:13px;}
.aform{background:var(--bg);border-radius:var(--rsm);padding:1rem;margin-top:12px;display:none;}
.aform.show{display:block;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.frow input{padding:7px 10px;border:1px solid var(--border);border-radius:var(--rsm);font-size:13px;font-family:inherit;background:var(--surface);color:var(--text);outline:none;width:100%;}
.frow input::placeholder{color:var(--hint);}
.factions{display:flex;gap:8px;margin-top:8px;}
.btn{padding:7px 16px;border:1px solid var(--border-strong);border-radius:var(--rsm);cursor:pointer;background:var(--surface);color:var(--text);font-family:inherit;font-size:13px;font-weight:500;transition:all .15s;}
.btn:hover{background:var(--bg);}
.btnp{background:var(--text);color:var(--surface);border-color:var(--text);}
.btnp:hover{background:#3A342E;}
.btnsm{padding:6px 13px;font-size:13px;}
@media(max-width:600px){.main{padding:1.25rem 1rem 3rem;}.cgridcards{grid-template-columns:1fr;}.frow{grid-template-columns:1fr;}header{padding:1rem;}}
</style>
</head>
<body>
<header>
  <div class="logo"><div class="dot"></div>智慧用卡建議</div>
  <div class="stamp">資料查核 2026/03 ／ 數字依各銀行官網為準</div>
</header>
<div class="main">
  <div class="ptabs">
    <button class="ptab active" data-tab="advisor">今天刷哪張？</button>
    <button class="ptab" data-tab="cards">我的卡片</button>
    <button class="ptab" data-tab="stores">特定商店記錄</button>
  </div>
  <div class="ppanel active" id="tab-advisor">
    <div class="adv-layout">
      <div class="cat-panel" id="cat-panel"></div>
      <div class="det-panel" id="det-panel">
        <div class="det-ph">← 從左側選擇消費分類<br>查看最佳刷卡建議與適用店家</div>
      </div>
    </div>
  </div>
  <div class="ppanel" id="tab-cards">
    <div class="slabel">持有卡片 — 來源：各銀行官網、iCard.AI、creditcards.com.tw、cashfeel.com.tw、beurlife.com，2026/03 查核</div>
    <div class="cgridcards" id="cards-grid"></div>
  </div>
  <div class="ppanel" id="tab-stores">
    <div class="sbox">
      <div class="alabel">我常去的店</div>
      <div class="sinrow">
        <input type="text" id="store-inp" placeholder="輸入商店名稱後按 Enter 或點新增" />
        <button class="btn btnp btnsm" onclick="addStore()">新增</button>
      </div>
      <div class="stags" id="store-tags"></div>
    </div>
    <div class="sbox">
      <div class="alabel">刷卡攻略備忘錄</div>
      <button class="btn btnsm" onclick="document.getElementById('store-form').classList.toggle('show')">+ 新增記錄</button>
      <div class="aform" id="store-form">
        <div class="frow"><input id="sf-store" placeholder="商店名稱" /><input id="sf-card" placeholder="推薦刷哪張卡" /></div>
        <div class="frow"><input id="sf-rate" placeholder="回饋率" /><input id="sf-note" placeholder="條件/備註" /></div>
        <div class="factions">
          <button class="btn btnp btnsm" onclick="saveStoreRec()">儲存</button>
          <button class="btn btnsm" onclick="document.getElementById('store-form').classList.remove('show')">取消</button>
        </div>
      </div>
      <div class="srecs" id="store-recs"></div>
    </div>
  </div>
</div>

let myStores=JSON.parse(localStorage.getItem('ev_stores')||'[]');
let myStoreRecs=JSON.parse(localStorage.getItem('ev_srecs')||'[]');

function renderCatPanel(){
  const p=document.getElementById('cat-panel');
  let h='';
  CAT_GROUPS.forEach(g=>{
    h+=`<div class="cg-label">${g.group}</div>`;
    g.cats.forEach(c=>{h+=`<button class="cbtn" data-id="${c.id}">${c.label}</button>`;});
  });
  p.innerHTML=h;
  p.querySelectorAll('.cbtn').forEach(b=>{
    b.addEventListener('click',()=>{
      p.querySelectorAll('.cbtn').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
      renderDetail(b.dataset.id);
    });
  });
}

function renderDetail(id){
  const d=R[id];
  const p=document.getElementById('det-panel');
  if(!d){p.innerHTML='<div class="det-ph">資料準備中</div>';return;}
  let h=`<div class="det-title">${d.title}</div><div class="det-sub">${d.sub}</div><div class="rlist">`;
  d.items.forEach((r,i)=>{
    h+=`<div class="rrow"><div class="rheader"><div class="rname">${i+1}. ${r.card}</div><span class="rtag ${r.rc}">${r.rate}</span></div>`;
    if(r.stores)h+=`<div class="rstores"><b>適用店家：</b>${r.stores}</div>`;
    h+=`<div class="rdetail">${r.detail}</div><div class="rcond">${r.cond}</div></div>`;
  });
  h+=`</div>`;
  if(d.warns&&d.warns.length)d.warns.forEach(w=>{h+=`<div class="wblk">${w}</div>`;});
  h+=`<div class="det-footer">所有數字依各銀行官網最終條款為準 ／ 查核：2026/03 ／ 每期活動調整請至各銀行 App 確認最新通路清單</div>`;
  p.innerHTML=h;
}

function renderCards(){
  document.getElementById('cards-grid').innerHTML=CARDS.map(c=>`
    <div class="ctile">
      <div class="ctop"><div><div class="cname">${c.name}</div><div class="cbank">${c.bank}</div></div><span class="cbadge" style="${c.bs}">${c.badge}</span></div>
      <div class="perks">${c.perks.map(p=>`<div class="prow"><span class="plabel">${p.l}</span><div class="pright"><div class="pval">${p.v}</div><div class="plimit">${p.c}</div></div></div>`).join('')}</div>
      <div class="cfooter">${c.note}<div class="csrc">查核來源：${c.src}</div></div>
    </div>`).join('');
}

function renderStores(){
  const t=document.getElementById('store-tags');
  t.innerHTML=myStores.length?myStores.map((s,i)=>`<span class="stag">${s}<button onclick="removeStore(${i})">×</button></span>`).join(''):`<span style="color:var(--hint);font-size:13px">尚無商店</span>`;
  const l=document.getElementById('store-recs');
  l.innerHTML=myStoreRecs.length?myStoreRecs.map((r,i)=>`<div class="srec"><span class="srec-store">${r.store}</span><span class="srec-card">${r.card}</span><span class="srec-rate">${r.rate}</span><span style="font-size:12px;color:var(--hint);flex:1">${r.note||''}</span><button class="srec-del" onclick="delStoreRec(${i})">×</button></div>`).join(''):`<div class="empty">點「+ 新增記錄」加入你的商店刷卡攻略</div>`;
}

function addStore(){
  const i=document.getElementById('store-inp');
  const v=i.value.trim();
  if(!v||myStores.includes(v)){i.value='';return;}
  myStores.push(v);save();i.value='';renderStores();
}
function removeStore(i){myStores.splice(i,1);save();renderStores();}
function saveStoreRec(){
  const s=document.getElementById('sf-store').value.trim();
  const c=document.getElementById('sf-card').value.trim();
  const r=document.getElementById('sf-rate').value.trim();
  const n=document.getElementById('sf-note').value.trim();
  if(!s||!c)return;
  myStoreRecs.push({store:s,card:c,rate:r,note:n});save();
  ['sf-store','sf-card','sf-rate','sf-note'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('store-form').classList.remove('show');
  renderStores();
}
function delStoreRec(i){myStoreRecs.splice(i,1);save();renderStores();}
function save(){
  try{
    localStorage.setItem('ev_stores',JSON.stringify(myStores));
    localStorage.setItem('ev_srecs',JSON.stringify(myStoreRecs));
  }catch(e){}
}

document.querySelectorAll('.ptab').forEach(t=>{
  t.addEventListener('click',()=>{
    document.querySelectorAll('.ptab').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.ppanel').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('tab-'+t.dataset.tab).classList.add('active');
  });
});
document.getElementById('store-inp').addEventListener('keydown',e=>{if(e.key==='Enter')addStore();});

renderCatPanel();renderCards();renderStores();
</script>
